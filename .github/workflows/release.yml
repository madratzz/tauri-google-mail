name: 'Publish Release'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
          - platform: 'ubuntu-latest'
          - platform: 'windows-latest'
          - platform: 'ubuntu-latest'
            container: 'archlinux:latest'

    runs-on: ${{ matrix.platform }}
    container: ${{ matrix.container }}
    steps:
      - name: bootstrap arch linux
        if: matrix.container == 'archlinux:latest'
        run: pacman -Sy --noconfirm git curl

      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu)
        if: matrix.platform == 'ubuntu-latest' && matrix.container != 'archlinux:latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: install dependencies (arch linux)
        if: matrix.container == 'archlinux:latest'
        run: pacman -S --noconfirm webkit2gtk-4.1 libappindicator-gtk3 librsvg patchelf

      - name: install node dependencies
        run: npm ci

      - name: build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'Gmail Desktop v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: true
          prerelease: false
